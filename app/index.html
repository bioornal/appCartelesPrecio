<body>
    <div class="container">
        <div class="input-section no-print">
            <div class="input-group">
                <label for="productName">Nombre del Producto:</label>
                <input type="text" id="productName" placeholder="KIT DE COCINA MONTESA 6P 2C 160.7X196X38.8CM">
            </div>
            <div class="input-group">
                <label for="productCode">Código/Descripción adicional:</label>
                <input type="text" id="productCode" placeholder="ART. 2907-8977-8905 FREJJOCRIS GUIAS TELESCOPICAS...">
            </div>
            <div class="input-group">
                <label for="precioDosxUno">Precio de Lista ($):</label>
                <input type="number" id="precioDosxUno" placeholder="359999.90" step="0.01">
            </div>
            <button class="btn-calculate" onclick="calculateFinancing()">Calcular Financiación</button>
        </div>
        
        <div class="header">
            <div class="logo-section">
                <div class="logo">
                    <img src="https://res.cloudinary.com/djtvjkcu6/image/upload/v1751206020/MegaMuebles/logoRedondo_f7kulu.png" alt="Logo de la empresa">
                </div>
                <span class="date-display" id="currentDate"></span>
            </div>
            <div class="discount-section">
                <p class="discount-percent">-40%</p>
                <p class="discount-text">DESCUENTO<br>CONTADO<br>VALOR UNITARIO</p>
            </div>
        </div>
        
        <div class="price-section">
            <div class="cash-price" id="precioUnitario">$215.999,94</div>
            <div class="product-name" id="productInfo">KIT DE COCINA MONTESA 6P 2C 160.7X196X38.8CM ART. 2907-8977-8905<br>FREJJOCRIS GUIAS TELESCOPICAS PATAS AJUSTABLES VOL3</div>
        </div>
        
        <div class="list-price-section">
            <div class="list-price-split">
                <div class="list-price" id="listPrice">$ 359.999,90</div>
                <div class="two-for-one-box">2x1</div>
            </div>
        </div>
        
        <div class="financing-header">FINANCIACIÓN 2x1</div>
        <table>
            <thead>
                <tr>
                    <th>PLAN</th>
                    <th>PAGOS</th>
                    <th>RECARGO</th>
                    <th>CUOTA</th>
                    <th>TOTAL</th>
                </tr>
            </thead>
            <tbody id="financingTable2x1"></tbody>
        </table>

        <div class="financing-header" style="margin-top: 20px;">FINANCIACIÓN UNIDAD</div>
        <table>
            <thead>
                <tr>
                    <th>PLAN</th>
                    <th>PAGOS</th>
                    <th>RECARGO</th>
                    <th>CUOTA</th>
                    <th>TOTAL</th>
                </tr>
            </thead>
            <tbody id="financingTableUnit"></tbody>
        </table>
    </div>

    <script>
        function formatNumber(num) {
    return Math.round(num).toLocaleString('es-AR', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
    }).replace(/,/g, '.');
}

        function calculateFinancing() {
            const productName = document.getElementById('productName').value || 'PRODUCTO';
            const productCode = document.getElementById('productCode').value || '';
            const precioDosxUno = parseFloat(document.getElementById('precioDosxUno').value) || 0;
            
            if (precioDosxUno <= 0) {
                alert('Por favor ingrese un precio válido');
                return;
            }

            // Calcular precios según nuevos descuentos
            const precioUnitario = precioDosxUno * 0.6;
            const debitPrice = precioDosxUno * 0.65;
            const oneInstallmentPrice = precioDosxUno * 0.7;
            const threeInstallmentPrice = precioDosxUno * 0.8;
            const sixInstallmentPrice = precioDosxUno * 0.85;

            // Actualizar display
            document.getElementById('precioUnitario').textContent = '$' + formatNumber(precioUnitario);
            document.getElementById('listPrice').textContent = '$ ' + formatNumber(precioDosxUno);
            document.getElementById('productInfo').innerHTML = productName.toUpperCase() + 
                (productCode ? '<br>' + productCode.toUpperCase() : '');

            // 1. Planes para VALOR UNITARIO (con recargos sobre precio unitario)
            const unitPlans = [
                { name: 'Transferencia/Débito', payments: 1, surcharge: 5, total: precioUnitario * 1.05, monthly: precioUnitario * 1.05 },
                { name: '1 Cuota', payments: 1, surcharge: 10, total: precioUnitario * 1.10, monthly: precioUnitario * 1.10 },
                { name: '3 Cuotas', payments: 3, surcharge: 20, total: precioUnitario * 1.20, monthly: (precioUnitario * 1.20) / 3 },
                { name: 'Plan Z', payments: 3, surcharge: 20, total: precioUnitario * 1.20, monthly: (precioUnitario * 1.20) / 3 },
                { name: '6 Cuotas', payments: 6, surcharge: 35, total: precioUnitario * 1.35, monthly: (precioUnitario * 1.35) / 6 }
            ];

            // 2. Planes para VALOR 2x1 (con recargos sobre precio de lista)
            const twoForOnePlans = [
                { name: 'Transferencia/Débito', payments: 1, surcharge: 5, total: precioDosxUno * 1.05, monthly: precioDosxUno * 1.05 },
                { name: '1 Cuota', payments: 1, surcharge: 10, total: precioDosxUno * 1.10, monthly: precioDosxUno * 1.10 },
                { name: '3 Cuotas', payments: 3, surcharge: 20, total: precioDosxUno * 1.20, monthly: (precioDosxUno * 1.20) / 3 },
                { name: 'Plan Z', payments: 3, surcharge: 20, total: precioDosxUno * 1.20, monthly: (precioDosxUno * 1.20) / 3 },
                { name: '6 Cuotas', payments: 6, surcharge: 35, total: precioDosxUno * 1.35, monthly: (precioDosxUno * 1.35) / 6 }
            ];

            // Poblar tabla de VALOR UNITARIO
            const tbodyUnit = document.getElementById('financingTableUnit');
            tbodyUnit.innerHTML = '';
            unitPlans.forEach(plan => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${plan.name}</td>
                    <td class="installments">${plan.payments}</td>
                    <td class="discount-cell">+${plan.surcharge}%</td>
                    <td class="cuota-cell">$ ${formatNumber(plan.monthly)}</td>
                    <td class="total-cell">$ ${formatNumber(plan.total)}</td>
                `;
                tbodyUnit.appendChild(row);
            });

            // Poblar tabla de VALOR 2x1
            const tbody2x1 = document.getElementById('financingTable2x1');
            tbody2x1.innerHTML = '';
            twoForOnePlans.forEach(plan => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${plan.name}</td>
                    <td class="installments">${plan.payments}</td>
                    <td class="discount-cell">+${plan.surcharge}%</td>
                    <td class="cuota-cell">$ ${formatNumber(plan.monthly)}</td>
                    <td class="total-cell">$ ${formatNumber(plan.total)}</td>
                `;
                tbody2x1.appendChild(row);
            });
        }
        
        // Allow Enter key to calculate
        document.getElementById('precioDosxUno').addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                calculateFinancing();
            }
        });
        
        // Load example on start
        window.onload = function() {
            // Set current date
            const today = new Date();
            const day = String(today.getDate()).padStart(2, '0');
            const month = String(today.getMonth() + 1).padStart(2, '0');
            const year = today.getFullYear();
            document.getElementById('currentDate').textContent = `${day}/${month}/${year}`;
            
            // Load example data
            document.getElementById('productName').value = 'KIT DE COCINA MONTESA 6P 2C 160.7X196X38.8CM';
            document.getElementById('productCode').value = 'ART. 2907-8977-8905 FREJJOCRIS GUIAS TELESCOPICAS PATAS AJUSTABLES VOL3';
            document.getElementById('precioDosxUno').value = '359999.90';
            calculateFinancing();
        };
    </script>
</body>
